name: Build and push sharelatex-git

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pull stock Overleaf image
        run: docker pull sharelatex/sharelatex:latest

      - name: Build frontend bundle
        run: bash .github/scripts/build-frontend.sh "$GITHUB_WORKSPACE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: Dockerfile.git
          push: true
          tags: |
            lukemartinlogan/sharelatex-git:latest
            lukemartinlogan/sharelatex-git:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
